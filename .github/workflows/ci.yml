name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  api-tests:
    name: API Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cme_test
          POSTGRES_PASSWORD: cme_test_password
          POSTGRES_DB: contentengine_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: apps/api/requirements.txt

      - name: Install dependencies
        run: |
          cd apps/api
          pip install -r requirements.txt

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://cme_test:cme_test_password@localhost:5432/contentengine_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: test-secret-for-ci-minimum-32-characters-long
          JWT_ALGORITHM: HS256
          ENVIRONMENT: test
          STRIPE_SECRET_KEY: sk_test_fake
          STRIPE_WEBHOOK_SECRET: whsec_fake
        run: |
          cd apps/api
          python -m pytest tests/ -v --tb=short

  web-lint:
    name: Web Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: |
          cd apps/web
          npm ci || npm install

      - name: Lint
        run: |
          cd apps/web
          npm run lint

      - name: Type check
        run: |
          cd apps/web
          npx tsc --noEmit
