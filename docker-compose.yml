services:
  # ---- PostgreSQL ----
  postgres:
    image: postgres:16-alpine
    container_name: pando-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pando}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pando_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-pandocast}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pando_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pando} -d ${POSTGRES_DB:-pandocast}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---- Redis ----
  redis:
    image: redis:7-alpine
    container_name: pando-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - pando_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---- FastAPI Backend ----
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: pando-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-pando}:${POSTGRES_PASSWORD:-pando_dev_password}@postgres:5432/${POSTGRES_DB:-pandocast}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ---- Next.js Frontend ----
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: pando-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pando_postgres_data:
  pando_redis_data:
