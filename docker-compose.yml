services:
  # ---- Firebase Emulators ----
  emulators:
    image: node:22-alpine
    container_name: pando-emulators
    working_dir: /app
    ports:
      - "4000:4000"   # Emulator Suite UI
      - "5001:5001"   # Cloud Functions
      - "8080:8080"   # Firestore
      - "9099:9099"   # Authentication
      - "9199:9199"   # Cloud Storage
    volumes:
      - .:/app
    command: npx firebase emulators:start --project pandocast-af179

  # ---- FastAPI Backend ----
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: pando-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      FIRESTORE_EMULATOR_HOST: emulators:8080
      FIREBASE_AUTH_EMULATOR_HOST: emulators:9099
      FIREBASE_STORAGE_EMULATOR_HOST: emulators:9199
    ports:
      - "8000:8000"
    depends_on:
      - emulators
    volumes:
      - ./apps/api:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ---- Next.js Frontend ----
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: pando-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_FIREBASE_FUNCTIONS_EMULATOR: "true"
    ports:
      - "3000:3000"
    depends_on:
      - emulators
